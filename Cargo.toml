[package]
name = "squeak"
version = "0.1.0"
edition = "2024"

[dependencies]
cxx = "1.0"
cxx-qt = "0.8"
cxx-qt-lib = { version = "0.8", features = ["qt_full"] }
portable-pty = "0.9"
toml = "0.8"
serde = { version = "1", features = ["derive"] }

[build-dependencies]
cxx-qt-build = { version = "0.8", features = ["link_qt_object_files"] }
