<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" fill="#1a1a2e"/>

  <!-- Single bot head, centered -->
  <g fill="#4fd1c5" stroke="#4fd1c5" transform="translate(16, 16)">
    <!-- Antenna -->
    <line x1="0" y1="-11" x2="0" y2="-6" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="-11" r="2"/>
    <!-- Head -->
    <rect x="-8" y="-6" width="16" height="14" rx="3" fill="none" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="-4" cy="1" r="1.5"/>
    <circle cx="4" cy="1" r="1.5"/>
  </g>
</svg>
